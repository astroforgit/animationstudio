<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash-to-Canvas Visual Editor</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --panel-bg: #2b2b36;
            --text: #e0e0e0;
            --accent: #00d2ff;
        }
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: var(--text);
            display: flex; height: 100vh; overflow: hidden;
        }
        #viewport {
            flex: 1; display: flex; flex-direction: column; background: #111;
        }
        #topbar {
            background-color: var(--panel-bg); padding: 10px 20px;
            border-bottom: 2px solid #1a1a20; display: flex; align-items: center; justify-content: space-between;
        }
        canvas {
            flex: 1; 
            background-color: #ffffff; 
            background-image: 
                linear-gradient(#f0f0f0 1px, transparent 1px),
                linear-gradient(90deg, #f0f0f0 1px, transparent 1px);
            background-size: 20px 20px;
            cursor: crosshair; 
            border-bottom: 2px solid var(--panel-bg);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        #timeline {
            height: 60px; background-color: var(--panel-bg); display: flex; padding: 10px 20px;
            align-items: center; gap: 15px;
        }
        #sidebar {
            width: 320px; background-color: var(--panel-bg); border-left: 2px solid #1a1a20;
            display: flex; flex-direction: column; z-index: 10;
        }
        .panel { padding: 15px; border-bottom: 2px solid #1a1a20; }
        h3 { margin: 0 0 15px 0; font-size: 14px; text-transform: uppercase; color: #888; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center;}
        
        .layer-item {
            padding: 8px; background: #3a3a46; margin-bottom: 5px; cursor: pointer; border-radius: 4px;
            border-left: 3px solid transparent; transition: 0.1s;
        }
        .layer-item:hover { background: #454555; }
        .layer-item.active { background: #454555; border-left: 3px solid var(--accent); font-weight: bold; }
        
        .prop-group { display: flex; align-items: center; margin-bottom: 10px; }
        .prop-group label { width: 50px; font-size: 13px; color: #aaa;}
        .prop-group input {
            flex: 1; background: #1e1e24; border: 1px solid #444; color: white;
            padding: 6px; border-radius: 4px;
        }
        .prop-group input:focus { outline: none; border-color: var(--accent); }
        .prop-group input[readonly] { opacity: 0.7; }
        .prop-delta-wrap {
            display: none; align-items: center; gap: 6px; margin-left: 8px; flex: 1;
        }
        .prop-delta-wrap.visible { display: flex; }
        .prop-delta-wrap span { color: #aaa; font-weight: bold; }
        .prop-toggle { margin-bottom: 12px; font-size: 13px; color: #aaa; }
        .prop-toggle label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .prop-toggle input { cursor: pointer; }
        
        button {
            background: var(--accent); border: none; padding: 8px 15px; border-radius: 4px;
            color: #000; font-weight: bold; cursor: pointer; transition: 0.1s;
        }
        button:hover { background: #00e5ff; transform: scale(1.05); }
        button.small { padding: 4px 8px; font-size: 11px; background: #444; color: #fff;}
        button.small:hover { background: #666; }
        
        input[type=range] { flex: 1; cursor: pointer; }
        input[type=file] { color: white; }
    </style>
</head>
<body>

    <div id="viewport">
        <!-- Top Bar for File Upload -->
        <div id="topbar">
            <div>
                <label style="margin-right: 10px; font-weight: bold;">1. Load JSON:</label>
                <input type="file" id="fileInput" accept=".json" />
            </div>
            <button id="exportBtn" style="background: #4caf50; color: white;">2. Export Edited JSON</button>
        </div>

        <!-- Render Canvas -->
        <canvas id="renderCanvas" width="800" height="600"></canvas>
        
        <!-- Timeline Controls -->
        <div id="timeline">
            <select id="timelineSelect" style="background:#444;color:white;padding:4px;border-radius:4px;border:1px solid #666;margin-right:10px;"></select>
            <button id="playBtn" disabled>Play</button>
            <span id="frameCounter" style="width: 80px; font-size: 14px;">Frame: 0</span>
            <input type="range" id="frameSlider" min="0" max="0" value="0" disabled>
            <label for="contextOpacitySlider" style="font-size: 13px; color: #aaa;">Other opacity</label>
            <input type="range" id="contextOpacitySlider" min="0" max="100" value="18">
            <span id="contextOpacityValue" style="width: 42px; font-size: 13px; text-align: right;">18%</span>
        </div>
    </div>

    <div id="sidebar">
        <!-- Layers / Elements in current frame -->
        <div class="panel" style="flex: 1; overflow-y: auto;">
            <h3>
                Layers (Frame <span id="layerFrameLabel">0</span>)
                <button class="small" id="resetViewBtn">Reset View</button>
            </h3>
            <div id="layerList"></div>
        </div>

        <!-- Properties Editor -->
        <div class="panel">
            <h3>Properties</h3>
            <div id="propertiesPanel" style="display: none;">
                <div class="prop-toggle">
                    <label>
                        <input type="checkbox" id="applyAllFramesToggle">
                        Apply to all frames
                    </label>
                </div>
                <div class="prop-group">
                    <label>ID:</label>
                    <span id="propId" style="color: var(--accent); font-weight: bold;">-</span>
                </div>
                <div class="prop-group">
                    <label>X:</label>
                    <input type="number" id="propX" step="1">
                    <div class="prop-delta-wrap" id="propXDeltaWrap">
                        <span>+</span>
                        <input type="number" id="propXDelta" step="1" value="0">
                    </div>
                </div>
                <div class="prop-group">
                    <label>Y:</label>
                    <input type="number" id="propY" step="1">
                    <div class="prop-delta-wrap" id="propYDeltaWrap">
                        <span>+</span>
                        <input type="number" id="propYDelta" step="1" value="0">
                    </div>
                </div>
                <div class="prop-group">
                    <label>Scale:</label>
                    <input type="number" id="propScale" step="0.01">
                    <div class="prop-delta-wrap" id="propScaleDeltaWrap">
                        <span>+</span>
                        <input type="number" id="propScaleDelta" step="0.01" value="0">
                    </div>
                </div>
                <div class="prop-group">
                    <label>Rot:</label>
                    <input type="number" id="propRot" step="1">
                    <div class="prop-delta-wrap" id="propRotDeltaWrap">
                        <span>+</span>
                        <input type="number" id="propRotDelta" step="1" value="0">
                    </div>
                </div>
            </div>
            <div id="noSelectionMsg" style="color: #666; font-size: 13px;">Select a layer or click a shape on the canvas to edit.</div>
        </div>
    </div>

<script type="module">
// Load animation data dynamically
let animationData;
fetch('./animation_data.json')
    .then(res => res.json())
    .then(data => {
        animationData = data;
        window.animationData = animationData;
        console.log('Auto-loaded animation_data.json');
        initEditor();
        resizeCanvas();
    })
    .catch(err => {
        console.error('Failed to load animation_data.json:', err);
    });

/**
 * EDITOR LOGIC & STATE
 */
let TOTAL_FRAMES = 0;
let currentFrame = 0;
let isPlaying = false;
let playInterval;
let selectedIndex = -1;
let contextOpacity = 0.18;
let applyToAllFrames = false;

// Viewport / Camera State
let viewportScale = 1.0;
let viewportOffsetX = 200;
let viewportOffsetY = 100;

// Mouse Interaction State
let isDraggingElement = false;
let isPanningCanvas = false;
let dragStartX = 0;
let dragStartY = 0;
let initialElemX = 0;
let initialElemY = 0;
let initialPanX = 0;
let initialPanY = 0;
let dragStartAllFramesDeltaX = 0;
let dragStartAllFramesDeltaY = 0;
let allFramesDisplayDelta = {
    x: 0,
    y: 0,
    scale: 0,
    rotationDeg: 0
};

// DOM Elements
const canvas = document.getElementById("renderCanvas");
const ctx = canvas.getContext("2d");
const slider = document.getElementById("frameSlider");
const frameCounter = document.getElementById("frameCounter");
const playBtn = document.getElementById("playBtn");
const timelineSelect = document.getElementById("timelineSelect");
const contextOpacitySlider = document.getElementById("contextOpacitySlider");
const contextOpacityValue = document.getElementById("contextOpacityValue");
const layerList = document.getElementById("layerList");
const layerFrameLabel = document.getElementById("layerFrameLabel");
const resetViewBtn = document.getElementById("resetViewBtn");
const fileInput = document.getElementById("fileInput");
const exportBtn = document.getElementById("exportBtn");

// Property inputs
const propPanel = document.getElementById("propertiesPanel");
const noSelMsg = document.getElementById("noSelectionMsg");
const applyAllFramesToggle = document.getElementById("applyAllFramesToggle");
const pId = document.getElementById("propId");
const pX = document.getElementById("propX");
const pY = document.getElementById("propY");
const pScale = document.getElementById("propScale");
const pRot = document.getElementById("propRot");
const pXDelta = document.getElementById("propXDelta");
const pYDelta = document.getElementById("propYDelta");
const pScaleDelta = document.getElementById("propScaleDelta");
const pRotDelta = document.getElementById("propRotDelta");
const pXDeltaWrap = document.getElementById("propXDeltaWrap");
const pYDeltaWrap = document.getElementById("propYDeltaWrap");
const pScaleDeltaWrap = document.getElementById("propScaleDeltaWrap");
const pRotDeltaWrap = document.getElementById("propRotDeltaWrap");

// Resize canvas to fill area
function resizeCanvas() {
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight - 60 - 55; // minus topbar and timeline
    draw();
}
window.addEventListener('resize', resizeCanvas);

/**
 * DATA LOADING & EXPORTING
 */
fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
        try {
            window.animationData = JSON.parse(event.target.result);
            initEditor();
        } catch (err) {
            alert("Error parsing JSON file. Make sure it is the file generated by the Node.js script.");
            console.error(err);
        }
    };
    reader.readAsText(file);
});

exportBtn.addEventListener('click', () => {
    if (!window.animationData) {
        alert("Load a file first before exporting.");
        return;
    }
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(window.animationData));
    const dlAnchorElem = document.createElement('a');
    dlAnchorElem.setAttribute("href",     dataStr);
    dlAnchorElem.setAttribute("download", "edited_animation_data.json");
    dlAnchorElem.click();
});

function initEditor() {
    const data = window.animationData;
    if (!data || !data.sprites) return;
    
    // Populate timeline dropdown
    timelineSelect.innerHTML = '';
    if (data.timelines && data.timelines.length > 0) {
        data.timelines.forEach(t => {
            const option = document.createElement('option');
            option.value = t.id;
            // Show parent info if this sprite is nested
            const parentInfo = t.parents && t.parents.length > 0 ? 
                ` [in: ${t.parents.join(', ')}]` : '';
            option.textContent = t.id + ' (' + t.frames + ' frames)' + 
                (t.id === data.mainTimeline ? ' [MAIN]' : '') + 
                parentInfo;
            timelineSelect.appendChild(option);
        });
    } else {
        // Fallback: auto-detect if no timelines array
        let mainTimeline = data.mainTimeline;
        if (!mainTimeline) {
            let maxFrames = 0;
            for (const spriteName in data.sprites) {
                const frameCount = Object.keys(data.sprites[spriteName]).length;
                if (frameCount > maxFrames) {
                    maxFrames = frameCount;
                    mainTimeline = spriteName;
                }
            }
            console.log('Detected mainTimeline:', mainTimeline);
        }
        const option = document.createElement('option');
        option.value = mainTimeline;
        option.textContent = mainTimeline + ' (auto-detected)';
        timelineSelect.appendChild(option);
    }
    
    // Select main timeline by default
    timelineSelect.value = data.mainTimeline;
    
    updateTimeline();
}

function updateTimeline() {
    const data = window.animationData;
    const timelineId = timelineSelect.value;
    
    TOTAL_FRAMES = Object.keys(data.sprites[timelineId]).length;
    slider.max = TOTAL_FRAMES - 1;
    slider.disabled = false;
    playBtn.disabled = false;
    
    currentFrame = 0;
    slider.value = 0;
    selectedIndex = -1;
    resetAllFramesDeltaInputs();
    
    frameCounter.innerText = `Frame: 0`;
    layerFrameLabel.innerText = "0";
    
    draw();
}

function getActiveFrameData() {
    return getTimelineFrameData(timelineSelect.value, currentFrame);
}

function syncSelectionForCurrentFrame() {
    const frameData = getActiveFrameData();
    if (!frameData || selectedIndex < 0 || selectedIndex >= frameData.length) {
        selectedIndex = -1;
    }
}

function getSelectedInstance() {
    const frameData = getActiveFrameData();
    if (!frameData || selectedIndex < 0 || selectedIndex >= frameData.length) return null;
    return frameData[selectedIndex];
}

function resetAllFramesDeltaInputs() {
    allFramesDisplayDelta = {
        x: 0,
        y: 0,
        scale: 0,
        rotationDeg: 0
    };
    syncAllFramesDeltaInputs();
}

function syncAllFramesDeltaInputs() {
    pXDelta.value = allFramesDisplayDelta.x.toFixed(2);
    pYDelta.value = allFramesDisplayDelta.y.toFixed(2);
    pScaleDelta.value = allFramesDisplayDelta.scale.toFixed(3);
    pRotDelta.value = allFramesDisplayDelta.rotationDeg.toFixed(2);
}

function updateApplyAllFramesUI() {
    const deltaWraps = [pXDeltaWrap, pYDeltaWrap, pScaleDeltaWrap, pRotDeltaWrap];
    const baseInputs = [pX, pY, pScale, pRot];

    applyAllFramesToggle.checked = applyToAllFrames;
    deltaWraps.forEach(wrap => wrap.classList.toggle('visible', applyToAllFrames));
    baseInputs.forEach(input => {
        input.readOnly = applyToAllFrames;
    });
    syncAllFramesDeltaInputs();
}

function forEachMatchingInstanceAcrossFrames(callback) {
    const data = window.animationData;
    const timelineId = timelineSelect.value;
    const selectedInstance = getSelectedInstance();
    if (!data || !timelineId || !selectedInstance || selectedIndex < 0) return;

    const selectedTargetId = selectedInstance.targetId;
    const timelineFrames = data.sprites[timelineId];

    Object.keys(timelineFrames).forEach(frameKey => {
        const frameData = timelineFrames[frameKey];
        if (!frameData || selectedIndex >= frameData.length) return;

        const instance = frameData[selectedIndex];
        if (!instance || instance.targetId !== selectedTargetId) return;

        callback(instance, parseInt(frameKey, 10));
    });
}

function applyDeltaToAllFrames(propertyName, deltaValue) {
    if (!Number.isFinite(deltaValue) || deltaValue === 0) return;

    forEachMatchingInstanceAcrossFrames(instance => {
        const t = instance.transform;

        if (propertyName === 'x') {
            t.x += deltaValue;
        } else if (propertyName === 'y') {
            t.y += deltaValue;
        } else if (propertyName === 'scale') {
            t.scaleX += deltaValue;
            t.scaleY += deltaValue;
        } else if (propertyName === 'rotationDeg') {
            t.rotationDeg += deltaValue;
        }
    });
}

function getAllFramesDisplayDeltaValue(propertyName) {
    return allFramesDisplayDelta[propertyName] || 0;
}

function setAllFramesDisplayDeltaValue(propertyName, totalDeltaValue) {
    const normalizedTotal = Number.isFinite(totalDeltaValue) ? totalDeltaValue : 0;
    const currentTotal = getAllFramesDisplayDeltaValue(propertyName);
    const diff = normalizedTotal - currentTotal;

    if (diff !== 0) {
        applyDeltaToAllFrames(propertyName, diff);
        allFramesDisplayDelta[propertyName] = normalizedTotal;
    }

    syncAllFramesDeltaInputs();
}

function applyAllFramesDelta(input, propertyName) {
    const totalDeltaValue = parseFloat(input.value);
    setAllFramesDisplayDeltaValue(propertyName, totalDeltaValue);
    draw();
}

// Timeline selection handler
timelineSelect.addEventListener('change', () => {
    updateTimeline();
});

/**
 * DRAWING SVG PATHS (Highly Robust version)
 */
function drawSVGPath(context, pathStr) {
    const parts = pathStr.trim().split(/\s+/);
    let drawCommand = "";
    
    for (let i = 0; i < parts.length; i++) {
        let token = parts[i];
        if (!token) continue;
        
        if (token === 'L' || token === 'M' || token === 'Q' || token === 'Z') {
            drawCommand = token;
            if (token === 'Z') context.closePath();
        } else {
            let p1 = parseFloat(token);
            switch (drawCommand) {
                case 'M':
                    context.moveTo(p1, parseFloat(parts[++i]));
                    break;
                case 'L':
                    context.lineTo(p1, parseFloat(parts[++i]));
                    break;
                case 'Q':
                    context.quadraticCurveTo(
                        p1, parseFloat(parts[++i]),
                        parseFloat(parts[++i]), parseFloat(parts[++i])
                    );
                    break;
            }
        }
    }
}

/**
 * RENDERING
 */
function drawGrid() {
    ctx.save();
    ctx.strokeStyle = "rgba(0,0,0,0.05)";
    ctx.lineWidth = 1;
    const gridSize = 20 * viewportScale;
    
    const startX = viewportOffsetX % gridSize;
    const startY = viewportOffsetY % gridSize;
    
    ctx.beginPath();
    for (let x = startX; x < canvas.width; x += gridSize) {
        ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
    }
    for (let y = startY; y < canvas.height; y += gridSize) {
        ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
    }
    ctx.stroke();

    // Draw main axes
    ctx.strokeStyle = "rgba(0,0,0,0.2)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(viewportOffsetX, 0); ctx.lineTo(viewportOffsetX, canvas.height);
    ctx.moveTo(0, viewportOffsetY); ctx.lineTo(canvas.width, viewportOffsetY);
    ctx.stroke();
    ctx.restore();
}

function resolveNestedFrame(instance, nestedSprite, parentFrame) {
    const nestedFrameCount = Object.keys(nestedSprite).length;

    if (Number.isFinite(instance.nestedFrameOffset)) {
        let resolvedFrame = instance.nestedFrameOffset;

        if (Number.isFinite(instance.nestedFrameModulo) && instance.nestedFrameModulo > 0) {
            resolvedFrame = ((resolvedFrame % instance.nestedFrameModulo) + instance.nestedFrameModulo) % instance.nestedFrameModulo;
        }

        if (!nestedSprite[resolvedFrame.toString()] && nestedFrameCount > 0) {
            return ((resolvedFrame % nestedFrameCount) + nestedFrameCount) % nestedFrameCount;
        }

        return resolvedFrame;
    }

    return nestedFrameCount > 1 ? parentFrame % nestedFrameCount : 0;
}

function applyInstanceTransform(instance) {
    const t = instance.transform;
    ctx.translate(t.x, t.y);
    ctx.rotate(t.rotationDeg * Math.PI / 180);
    ctx.scale(t.scaleX, t.scaleY);
}

function getTimelineFrameCount(timelineId) {
    const data = window.animationData;
    const sprite = data && data.sprites ? data.sprites[timelineId] : null;
    return sprite ? Object.keys(sprite).length : 0;
}

function normalizeFrameNumber(frameNumber, frameCount) {
    if (!frameCount) return 0;
    return ((frameNumber % frameCount) + frameCount) % frameCount;
}

function getFrameDistance(frameA, frameB, frameCount) {
    if (!frameCount) return Number.MAX_SAFE_INTEGER;
    const delta = Math.abs(frameA - frameB);
    return Math.min(delta, frameCount - delta);
}

function getTimelineFrameData(timelineId, frameNumber) {
    const data = window.animationData;
    if (!data || !data.sprites[timelineId]) return null;

    const frameCount = getTimelineFrameCount(timelineId);
    const normalizedFrame = normalizeFrameNumber(frameNumber, frameCount);
    return data.sprites[timelineId][normalizedFrame.toString()] || null;
}

function findContextPathInTimeline(timelineId, timelineFrame, targetTimelineId, targetFrame, path = []) {
    const data = window.animationData;
    const frameData = getTimelineFrameData(timelineId, timelineFrame);
    if (!frameData) return null;

    let bestCandidate = null;

    for (const instance of frameData) {
        if (!data.sprites[instance.targetId]) continue;

        const nestedSprite = data.sprites[instance.targetId];
        const nestedFrame = resolveNestedFrame(instance, nestedSprite, timelineFrame);
        const nextPath = path.concat({
            instance,
            parentTimelineId: timelineId,
            parentFrame: timelineFrame,
            nestedFrame
        });

        if (instance.targetId === targetTimelineId) {
            const targetFrameCount = getTimelineFrameCount(targetTimelineId);
            const normalizedTargetFrame = normalizeFrameNumber(targetFrame, targetFrameCount);
            const score = getFrameDistance(nestedFrame, normalizedTargetFrame, targetFrameCount);
            const directCandidate = {
                path: nextPath,
                score,
                exact: score === 0
            };

            if (!bestCandidate || directCandidate.score < bestCandidate.score) {
                bestCandidate = directCandidate;
            }

            if (directCandidate.exact) {
                return directCandidate;
            }
        }

        const nestedCandidate = findContextPathInTimeline(
            instance.targetId,
            nestedFrame,
            targetTimelineId,
            targetFrame,
            nextPath
        );

        if (nestedCandidate && (!bestCandidate || nestedCandidate.score < bestCandidate.score)) {
            bestCandidate = nestedCandidate;
        }

        if (bestCandidate && bestCandidate.exact) {
            return bestCandidate;
        }
    }

    return bestCandidate;
}

function getContextRenderState(selectedTimelineId, selectedFrame) {
    const data = window.animationData;
    if (!data || selectedTimelineId === data.mainTimeline) return null;

    const mainTimelineId = data.mainTimeline;
    const mainFrameCount = getTimelineFrameCount(mainTimelineId);
    let bestCandidate = null;

    for (let mainFrame = 0; mainFrame < mainFrameCount; mainFrame++) {
        const candidate = findContextPathInTimeline(mainTimelineId, mainFrame, selectedTimelineId, selectedFrame);
        if (!candidate) continue;

        const candidateWithFrame = {
            ...candidate,
            mainFrame
        };

        if (!bestCandidate || candidateWithFrame.score < bestCandidate.score) {
            bestCandidate = candidateWithFrame;
        }

        if (candidateWithFrame.exact) {
            break;
        }
    }

    return bestCandidate;
}

function renderTimelineFrame(timelineId, frameNumber, highlightedIndex = -1, fadedOtherOpacity = null) {
    const frameData = getTimelineFrameData(timelineId, frameNumber);
    if (!frameData) return;

    frameData.forEach((instance, index) => {
        ctx.save();

        if (highlightedIndex !== -1 && index !== highlightedIndex && Number.isFinite(fadedOtherOpacity)) {
            ctx.globalAlpha *= fadedOtherOpacity;
        }

        renderInstance(instance, index === highlightedIndex, null, frameNumber);
        ctx.restore();
    });
}

function renderEditedTimelineInContext(contextState, fadedOtherOpacity = null) {
    ctx.save();

    contextState.path.forEach(step => {
        applyInstanceTransform(step.instance);
    });

    renderTimelineFrame(timelineSelect.value, currentFrame, selectedIndex, fadedOtherOpacity);
    ctx.restore();
}

function renderInstance(instance, isSelected, checkHitXY = null, parentFrame = 0) {
    let hitFound = false;
    const data = window.animationData;
    ctx.save();

    const t = instance.transform;
    applyInstanceTransform(instance);

    const targetId = instance.targetId;

    if (data.sprites[targetId]) {
        const nestedSprite = data.sprites[targetId];
        const nestedFrame = resolveNestedFrame(instance, nestedSprite, parentFrame);
        const subFrame = nestedSprite[nestedFrame.toString()];
        if (subFrame) {
            subFrame.forEach(subInst => {
                if (renderInstance(subInst, false, checkHitXY, nestedFrame)) hitFound = true;
            });
        }
    } 
    else if (data.shapes[targetId]) {
        // Render Shape
        data.shapes[targetId].forEach(shapePart => {
            const inheritedAlpha = ctx.globalAlpha;
            ctx.beginPath();
            drawSVGPath(ctx, shapePart.pathData);
            
            // Hit Test Logic
            if (checkHitXY) {
                if (ctx.isPointInPath(checkHitXY.x, checkHitXY.y)) {
                    hitFound = true;
                }
            } 
            // Normal Render Logic
            else {
                // Apply visual style based on selection
                if (shapePart.type === 'fill') {
                    ctx.fillStyle = `rgba(${shapePart.color.join(',')})`;
                    ctx.fill("evenodd");
                } else {
                    ctx.strokeStyle = `rgba(${shapePart.color.join(',')})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                if (isSelected) {
                    // Selected element: bright highlight
                    ctx.strokeStyle = "#00d2ff";
                    ctx.lineWidth = 3 / t.scaleX;
                    ctx.stroke();
                    
                    // Draw selection handles
                    ctx.fillStyle = "#00d2ff";
                    ctx.globalAlpha = inheritedAlpha * 0.3;
                    ctx.fill("evenodd");
                    ctx.globalAlpha = inheritedAlpha;
                } else {
                    // Non-selected elements: slightly more visible
                    ctx.globalAlpha = inheritedAlpha * 0.85;
                    ctx.strokeStyle = "rgba(255,255,255,0.3)";
                    ctx.lineWidth = 1 / t.scaleX;
                    ctx.stroke();
                    ctx.globalAlpha = inheritedAlpha;
                }
            }
        });
    }
    
    ctx.restore();
    return hitFound;
}

function draw() {
    const data = window.animationData;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid();

    if (!data) {
        ctx.fillStyle = "#888";
        ctx.font = "20px Arial";
        ctx.fillText("Please Load 'animation_data.json' using the button above.", 50, 50);
        return;
    }

    syncSelectionForCurrentFrame();
    
    ctx.save();
    ctx.translate(viewportOffsetX, viewportOffsetY);
    ctx.scale(viewportScale, viewportScale);

    const activeTimelineId = timelineSelect.value;
    const contextState = getContextRenderState(activeTimelineId, currentFrame);
    const fadeOtherLayers = selectedIndex !== -1 ? contextOpacity : null;

    if (contextState) {
        ctx.save();
        ctx.globalAlpha = contextOpacity;
        renderTimelineFrame(data.mainTimeline, contextState.mainFrame, -1);
        ctx.restore();

        renderEditedTimelineInContext(contextState, fadeOtherLayers);
    } else {
        renderTimelineFrame(activeTimelineId, currentFrame, selectedIndex, fadeOtherLayers);
    }
    
    ctx.restore();
    updateLayerPanel();
    populateProperties();
}

/**
 * INTERACTION: HIT TESTING
 */
function getHitElement(mouseX, mouseY) {
    const data = window.animationData;
    if(!data) return -1;

    const activeTimelineId = timelineSelect.value;
    const frameData = getTimelineFrameData(activeTimelineId, currentFrame);
    if (!frameData) return -1;

    const contextState = getContextRenderState(activeTimelineId, currentFrame);

    ctx.save();
    ctx.translate(viewportOffsetX, viewportOffsetY);
    ctx.scale(viewportScale, viewportScale);

    if (contextState) {
        contextState.path.forEach(step => {
            applyInstanceTransform(step.instance);
        });
    }
    
    // Reverse loop to select top-most element first
    for (let i = frameData.length - 1; i >= 0; i--) {
        let isHit = renderInstance(frameData[i], false, {x: mouseX, y: mouseY}, currentFrame);
        
        if (isHit) {
            ctx.restore();
            return i;
        }
    }

    ctx.restore();
    return -1;
}

/**
 * MOUSE EVENTS (Pan, Drag, Zoom, Hover)
 */
canvas.addEventListener('wheel', (e) => {
    const data = window.animationData;
    if(!data) return;
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    const zoomIntensity = 0.1;
    const wheel = e.deltaY < 0 ? 1 : -1;
    const zoomFactor = Math.exp(wheel * zoomIntensity);

    viewportOffsetX = mouseX - (mouseX - viewportOffsetX) * zoomFactor;
    viewportOffsetY = mouseY - (mouseY - viewportOffsetY) * zoomFactor;
    viewportScale *= zoomFactor;

    draw();
});

canvas.addEventListener('mousedown', (e) => {
    const data = window.animationData;
    if(!data) return;
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    // Middle click OR clicked on empty space = PAN
    if (e.button === 1) { 
        e.preventDefault();
        startPan(mouseX, mouseY);
        return;
    }

    // Left click
    if (e.button === 0) {
        const hitIndex = getHitElement(mouseX, mouseY);
        
        if (hitIndex !== -1) {
            // Start Element Drag
            selectLayer(hitIndex);
            isDraggingElement = true;
            dragStartX = mouseX;
            dragStartY = mouseY;

            const instance = getSelectedInstance();
            if (!instance) {
                isDraggingElement = false;
                return;
            }

            initialElemX = instance.transform.x;
            initialElemY = instance.transform.y;
        dragStartAllFramesDeltaX = getAllFramesDisplayDeltaValue('x');
        dragStartAllFramesDeltaY = getAllFramesDisplayDeltaValue('y');
            canvas.style.cursor = 'move';
        } else {
            // Clicked empty space: deselect & start pan
            selectLayer(-1);
            startPan(mouseX, mouseY);
        }
    }
});

function startPan(mouseX, mouseY) {
    isPanningCanvas = true;
    dragStartX = mouseX;
    dragStartY = mouseY;
    initialPanX = viewportOffsetX;
    initialPanY = viewportOffsetY;
    canvas.style.cursor = 'grabbing';
}

canvas.addEventListener('mousemove', (e) => {
    const data = window.animationData;
    if(!data) return;
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    if (isDraggingElement && selectedIndex !== -1) {
        const dx = (mouseX - dragStartX) / viewportScale;
        const dy = (mouseY - dragStartY) / viewportScale;

        const instance = getSelectedInstance();
        if (!instance) {
            isDraggingElement = false;
            return;
        }

        if (applyToAllFrames) {
            setAllFramesDisplayDeltaValue('x', dragStartAllFramesDeltaX + dx);
            setAllFramesDisplayDeltaValue('y', dragStartAllFramesDeltaY + dy);
        } else {
            const t = instance.transform;
            t.x = initialElemX + dx;
            t.y = initialElemY + dy;
            
            pX.value = parseFloat(t.x.toFixed(2));
            pY.value = parseFloat(t.y.toFixed(2));
        }

        draw();
    } 
    else if (isPanningCanvas) {
        const dx = mouseX - dragStartX;
        const dy = mouseY - dragStartY;
        viewportOffsetX = initialPanX + dx;
        viewportOffsetY = initialPanY + dy;
        draw();
    } 
    else {
        // Change cursor on hover
        const hitIndex = getHitElement(mouseX, mouseY);
        canvas.style.cursor = (hitIndex !== -1) ? 'move' : 'crosshair';
    }
});

window.addEventListener('mouseup', () => {
    isDraggingElement = false;
    isPanningCanvas = false;
    if(window.animationData) canvas.style.cursor = 'crosshair';
});

resetViewBtn.addEventListener('click', () => {
    viewportScale = 1.0;
    viewportOffsetX = 200;
    viewportOffsetY = 100;
    draw();
});

/**
 * UI PANELS & TIMELINE
 */
function updateLayerPanel() {
    const data = window.animationData;
    layerFrameLabel.innerText = currentFrame;
    layerList.innerHTML = "";
    
    if(!data) return;

    const frameData = data.sprites[timelineSelect.value][currentFrame.toString()];
    if (!frameData) return;

    const timelineIds = new Set((data.timelines || []).map(t => t.id));

    frameData.forEach((instance, index) => {
        const div = document.createElement("div");
        div.id = `layer-item-${index}`;
        div.className = "layer-item" + (index === selectedIndex ? " active" : "");
        
        // Show if it's a sprite (nested animation) or shape
        const isSprite = data.sprites[instance.targetId] ? " 🎬" : "";
        const spriteInfo = data.sprites[instance.targetId] ? 
            ` (${Object.keys(data.sprites[instance.targetId]).length}fr)` : "";
        const currentSpriteFrame = timelineIds.has(instance.targetId)
            ? ` [frame ${resolveNestedFrame(instance, data.sprites[instance.targetId], currentFrame)}]`
            : "";
        
        div.innerText = `Layer ${index}: ${instance.targetId}${isSprite}${spriteInfo}${currentSpriteFrame}`;
        div.onclick = () => selectLayer(index);
        layerList.appendChild(div);
    });
}

function selectLayer(index) {
    const selectionChanged = index !== selectedIndex;
    selectedIndex = index;

    if (selectionChanged) {
        resetAllFramesDeltaInputs();
    }
    
    document.querySelectorAll('.layer-item').forEach(el => el.classList.remove('active'));
    if(index !== -1) {
        const el = document.getElementById(`layer-item-${index}`);
        if(el) el.classList.add('active');
    }
    
    draw();
}

function populateProperties() {
    const data = window.animationData;
    const instance = getSelectedInstance();

    updateApplyAllFramesUI();

    if (!data || !instance) {
        propPanel.style.display = "none";
        noSelMsg.style.display = "block";
        return;
    }
    
    propPanel.style.display = "block";
    noSelMsg.style.display = "none";

    const displayX = applyToAllFrames ? instance.transform.x - getAllFramesDisplayDeltaValue('x') : instance.transform.x;
    const displayY = applyToAllFrames ? instance.transform.y - getAllFramesDisplayDeltaValue('y') : instance.transform.y;
    const displayScale = applyToAllFrames ? instance.transform.scaleX - getAllFramesDisplayDeltaValue('scale') : instance.transform.scaleX;
    const displayRot = applyToAllFrames ? instance.transform.rotationDeg - getAllFramesDisplayDeltaValue('rotationDeg') : instance.transform.rotationDeg;

    pId.innerText = instance.targetId;
    pX.value = parseFloat(displayX.toFixed(2));
    pY.value = parseFloat(displayY.toFixed(2));
    pScale.value = parseFloat(displayScale.toFixed(3)); 
    pRot.value = parseFloat(displayRot.toFixed(2));
}

function applyPropertyChanges() {
    if (applyToAllFrames) return;

    const instance = getSelectedInstance();
    if (!instance) return;
    const t = instance.transform;
    
    t.x = parseFloat(pX.value) || 0;
    t.y = parseFloat(pY.value) || 0;
    t.scaleX = parseFloat(pScale.value) || 1;
    t.scaleY = parseFloat(pScale.value) || 1;
    t.rotationDeg = parseFloat(pRot.value) || 0;
    
    draw();
}
[pX, pY, pScale, pRot].forEach(inp => {
    inp.addEventListener('input', applyPropertyChanges);
});

applyAllFramesToggle.addEventListener('change', (e) => {
    applyToAllFrames = e.target.checked;
    resetAllFramesDeltaInputs();
    updateApplyAllFramesUI();
    populateProperties();
});

[
    [pXDelta, 'x'],
    [pYDelta, 'y'],
    [pScaleDelta, 'scale'],
    [pRotDelta, 'rotationDeg']
].forEach(([input, propertyName]) => {
    input.addEventListener('change', () => applyAllFramesDelta(input, propertyName));
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            applyAllFramesDelta(input, propertyName);
        }
    });
});

contextOpacitySlider.addEventListener('input', (e) => {
    contextOpacity = parseInt(e.target.value, 10) / 100;
    contextOpacityValue.innerText = `${e.target.value}%`;
    draw();
});

// Timeline Controls
slider.addEventListener('input', (e) => {
    const data = window.animationData;
    if(!data) return;
    currentFrame = parseInt(e.target.value, 10);
    frameCounter.innerText = `Frame: ${currentFrame}`;
    draw();
});

playBtn.addEventListener('click', () => {
    const data = window.animationData;
    if(!data) return;
    isPlaying = !isPlaying;
    playBtn.innerText = isPlaying ? "Pause" : "Play";
    
    if (isPlaying) {
        playInterval = setInterval(() => {
            currentFrame = (currentFrame + 1) % TOTAL_FRAMES;
            slider.value = currentFrame;
            frameCounter.innerText = `Frame: ${currentFrame}`;
            // Intentionally not deselecting so user can tweak parameters while playing
            draw();
        }, 1000 / 30); // Play at ~30 FPS
    } else {
        clearInterval(playInterval);
    }
});
</script>
